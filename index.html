<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Calculator - Mr. Moustache</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111827;
      color: #f9fafb;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      color: #38bdf8;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 800px;
      margin-top: 20px;
      background-color: #1f2937;
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #374151;
    }
    .total-row {
      background-color: #0f172a;
      font-weight: bold;
      color: #38bdf8;
    }
    .total-row td {
      border-top: 2px solid #38bdf8;
    }
    th {
      background-color: #0f172a;
      color: #38bdf8;
    }
    input {
      width: 75px;
      padding: 3px;
      background-color: #111827;
      color: white;
      border: 1px solid #374151;
      border-radius: 5px;
      text-align: center;
    }
    .buy-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .plus-btn {
      background-color: #10b981;
      border: none;
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
    }
    .plus-btn:hover {
      background-color: #059669;
    }
    .minus-btn {
      background-color: #ef4444;
      border: none;
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
    }
    .minus-btn:hover {
      background-color: #dc2626;
    }
    button {
      background-color: #38bdf8;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
      color: #111827;
      font-weight: bold;
    }
    button:hover {
      background-color: #7dd3fc;
    }
    .controls {
      background: linear-gradient(145deg, #1f2937 0%, #374151 100%);
      border: 2px solid #38bdf8;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .controls label {
      color: #fbbf24;
      font-weight: 600;
      white-space: nowrap;
    }
    .save-status {
      text-align: center;
      margin: 8px 0 15px 0;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.3s ease;
      min-height: 20px;
    }
    .result {
      background-color: #1f2937;
      padding: 15px;
      border-radius: 8px;
      width: 100%;
      max-width: 800px;
      margin-top: 20px;
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      h1 {
        font-size: 1.8rem;
        margin-bottom: 15px;
      }

      table {
        max-width: 100%;
        font-size: 0.9rem;
      }

      th, td {
        padding: 8px 4px;
      }

      input {
        width: 50px;
        font-size: 14px;
      }

      .buy-controls {
        gap: 3px;
      }

      .plus-btn, .minus-btn {
        width: 22px;
        height: 22px;
        font-size: 12px;
      }

      button {
        padding: 10px 16px;
        margin: 4px;
        font-size: 0.85rem;
      }

      .controls {
        flex-direction: column;
        align-items: center;
        margin-bottom: 20px;
      }

      .controls label {
        margin-bottom: 8px;
      }

      .save-status {
        font-size: 0.75rem;
        margin: 6px 0 12px 0;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
      }

      table {
        font-size: 0.8rem;
      }

      th, td {
        padding: 6px 2px;
      }

      input {
        width: 45px;
        padding: 3px 4px;
      }

      .plus-btn, .minus-btn {
        width: 20px;
        height: 20px;
        font-size: 11px;
      }

      button {
        padding: 8px 12px;
        margin: 3px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <h1>Poker Calc by Mr. Sibil</h1>

  <div class="controls">
    <label>Number of Players: </label>
    <input type="number" id="playerCount" value="9" min="2" max="12">
    <button onclick="generateTable()">Generate</button>
  </div>

  <div id="saveIndicator" class="save-status"></div>

  <div id="tableContainer"></div>

  <script>
    const buyValue = 5; // million per buy

    // Auto-save functionality
    let autoSaveTimer;

    function saveGameState() {
      const count = parseInt(document.getElementById("playerCount").value);
      const gameState = {
        playerCount: count,
        expense: document.getElementById("expense").value,
        players: [],
        timestamp: new Date().toISOString()
      };

      for (let i = 0; i < count; i++) {
        gameState.players.push({
          name: document.getElementById(`name_${i}`).value,
          buys: document.getElementById(`buy_${i}`).value,
          chipsBack: document.getElementById(`back_${i}`).value
        });
      }

      localStorage.setItem('pokerGameState', JSON.stringify(gameState));
      updateSaveIndicator();
    }

    function loadGameState() {
      const savedState = localStorage.getItem('pokerGameState');
      if (savedState) {
        const gameState = JSON.parse(savedState);
        document.getElementById("playerCount").value = gameState.playerCount;
        // Don't set expense here - it will be set in generateTable()
      }
    }

    function updateSaveIndicator() {
      const indicator = document.getElementById('saveIndicator');
      if (indicator) {
        const savedState = localStorage.getItem('pokerGameState');
        if (savedState) {
          const gameState = JSON.parse(savedState);
          const savedTime = new Date(gameState.timestamp);
          const now = new Date();
          const diffMinutes = Math.floor((now - savedTime) / (1000 * 60));

          let timeText;
          if (diffMinutes < 1) timeText = 'just now';
          else if (diffMinutes < 60) timeText = `${diffMinutes}m ago`;
          else timeText = `${Math.floor(diffMinutes / 60)}h ago`;

          indicator.textContent = `💾 Saved ${timeText}`;
          indicator.style.color = '#22c55e';
          indicator.style.backgroundColor = 'rgba(34, 197, 94, 0.1)';
        } else {
          indicator.textContent = '';
          indicator.style.backgroundColor = 'transparent';
        }
      }
    }

    function clearSavedData() {
      localStorage.removeItem('pokerGameState');
      localStorage.removeItem('pokerPlayerNames');
      updateSaveIndicator();
      alert('All saved data cleared!');
    }

    function addBuy(playerIndex) {
      const buyInput = document.getElementById(`buy_${playerIndex}`);
      buyInput.value = parseInt(buyInput.value) + 1;
      updateTotals();
      saveGameState();
    }

    function removeBuy(playerIndex) {
      const buyInput = document.getElementById(`buy_${playerIndex}`);
      const currentValue = parseInt(buyInput.value);
      if (currentValue > 0) {
        buyInput.value = currentValue - 1;
        updateTotals();
        saveGameState();
      }
    }

    function updateTotals() {
      const count = parseInt(document.getElementById("playerCount").value);
      let totalBuys = 0;
      let totalChips = 0;

      for (let i = 0; i < count; i++) {
        const buys = parseInt(document.getElementById(`buy_${i}`).value) || 0;
        const chips = parseFloat(document.getElementById(`back_${i}`).value) || 0;
        totalBuys += buys * buyValue; // Convert to millions
        totalChips += chips;
      }

      document.getElementById("totalBuys").textContent = totalBuys.toFixed(1) + "M";
      document.getElementById("totalChips").textContent = totalChips.toFixed(1) + "M";
    }

    function generateTable() {
      const count = parseInt(document.getElementById("playerCount").value);
      const container = document.getElementById("tableContainer");
      // Load saved names from localStorage
      const savedNames = JSON.parse(localStorage.getItem('pokerPlayerNames')) || [];
      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Buys (5M each)</th>
              <th>Chips Back (M)</th>
            </tr>
          </thead>
          <tbody>
            ${Array.from({ length: count }, (_, i) => `
              <tr>
                <td><input type="text" id="name_${i}" value="${savedNames[i] || 'Player ' + (i + 1)}"></td>
                <td>
                  <div class="buy-controls">
                    <button class="minus-btn" onclick="removeBuy(${i})">-</button>
                    <input type="number" id="buy_${i}" value="1" min="0">
                    <button class="plus-btn" onclick="addBuy(${i})">+</button>
                  </div>
                </td>
                <td><input type="number" id="back_${i}" value="" min="0"></td>
              </tr>
            `).join('')}
            <tr class="total-row">
              <td>Total</td>
              <td id="totalBuys">0</td>
              <td id="totalChips">0.0M</td>
            </tr>
          </tbody>
        </table>
        <div style="margin-top:15px;">
          <label>Total Expense (M): </label>
          <input type="number" id="expense" value="0" min="0">
        </div>
        <button onclick="calculate()">🎯 Calculate</button>
        <button onclick="resetNumbers()">🔄 Reset</button>
        <button onclick="clearSavedData()" style="background: linear-gradient(145deg, #dc2626 0%, #b91c1c 100%); border: 2px solid #dc2626; color: #fbbf24;">🗑️ Clear Data</button>
        <div id="resultContainer"></div>
      `;

      // Restore saved game state if it exists
      const savedState = localStorage.getItem('pokerGameState');
      if (savedState) {
        const gameState = JSON.parse(savedState);
        setTimeout(() => {
          gameState.players.forEach((player, index) => {
            if (document.getElementById(`name_${index}`)) {
              document.getElementById(`name_${index}`).value = player.name;
              document.getElementById(`buy_${index}`).value = player.buys;
              document.getElementById(`back_${index}`).value = player.chipsBack;
            }
          });
          document.getElementById("expense").value = gameState.expense || 0;
          updateTotals();
          updateSaveIndicator();
        }, 100);
      }

      // Add event listeners to update totals and auto-save when inputs change
      setTimeout(() => {
        for (let i = 0; i < count; i++) {
          document.getElementById(`buy_${i}`).addEventListener('input', () => {
            updateTotals();
            saveGameState();
          });
          document.getElementById(`back_${i}`).addEventListener('input', () => {
            updateTotals();
            saveGameState();
          });
          document.getElementById(`name_${i}`).addEventListener('input', saveGameState);
        }
        document.getElementById('expense').addEventListener('input', saveGameState);
        updateTotals();
      }, 0);
    }

    function calculate() {
      const count = parseInt(document.getElementById("playerCount").value);
      const expense = parseFloat(document.getElementById("expense").value);
      let players = [];

      for (let i = 0; i < count; i++) {
        const name = document.getElementById(`name_${i}`).value;
        const buys = parseInt(document.getElementById(`buy_${i}`).value);
        const back = parseFloat(document.getElementById(`back_${i}`).value);
        const totalBuy = buys * buyValue;
        const net = back - totalBuy;
        players.push({ name, buys, back, totalBuy, net });
      }

      // Save names to localStorage
      const names = players.map(p => p.name);
      localStorage.setItem('pokerPlayerNames', JSON.stringify(names));

      const winner = players.reduce((a, b) => a.net > b.net ? a : b);

      const losers = players.filter(p => p.net < 0);
      const others = players.filter(p => p.name !== winner.name);

      const totalLoss = losers.reduce((sum, p) => sum + Math.abs(p.net), 0);
      const halfExpense = expense / 2;
      const equalShare = halfExpense / others.length;

      players.forEach(p => {
        if (p.name === winner.name) {
          p.toPay = 0;
        } else {
          const lossShare = p.net < 0 ? (Math.abs(p.net) / totalLoss) * halfExpense : 0;
          p.toPay = lossShare + equalShare;
        }
      });

      const resultHTML = `
        <div class="result">
          <h3>Results</h3>
          ${players.map(p => `
            <div><strong>${p.name}</strong> — Net: ${p.net.toFixed(1)}M — Pays: ${p.toPay.toFixed(1)}M</div>
          `).join('')}
          <p style="margin-top:10px;color:#38bdf8;">🏆 ${winner.name} is the winner and pays nothing!</p>
        </div>
      `;
      document.getElementById("resultContainer").innerHTML = resultHTML;
      document.getElementById("resultContainer").scrollIntoView({ behavior: 'smooth' });
    }

    function resetNumbers() {
      const count = parseInt(document.getElementById("playerCount").value);
      for (let i = 0; i < count; i++) {
        document.getElementById(`buy_${i}`).value = 0;
        document.getElementById(`back_${i}`).value = "";
      }
      document.getElementById("expense").value = 0;
      document.getElementById("resultContainer").innerHTML = "";
      updateTotals();
      saveGameState();
    }

    loadGameState();
    generateTable();
  </script>

</body>
</html>
